# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Joseph Pfeifer Games
email: joseph.b.pfeifer@gmail.com
description: >-
  Indie game portfolio and official landing pages for Joseph Pfeifer's mobile games.
baseurl: "/game_sites" # project repository path for GitHub Pages
url: "https://games.nona.business" # GitHub Pages host
github_username: jbpfeifer
author: Joseph Pfeifer
subtitle: Official Pages
tagline: Small mobile games with clean presentation and reliable legal pages.
location: Weichselbaum, Austria
brand:
  studio: Nona Business
  headline: The games I make, in one place.
  subheadline: I am an indie developer, and this site is where I host my games along with the support, privacy, and store information around them.

# Build settings
theme: minima
plugins:
  - jekyll-feed

header_pages:
  - impressum.md
  - datenschutz.md
  - about.markdown

