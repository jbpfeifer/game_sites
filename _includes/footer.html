  <footer id="footer">
    <div class="inner">
      <ul class="icons">
        <li><a href="mailto:{{ site.email }}" class="icon alt fa-envelope"><span class="label">Email</span></a></li>
        {% if site.github_username %}
          <li><a href="https://github.com/{{ site.github_username }}" class="icon alt fa-github" target="_blank" rel="noopener noreferrer"><span class="label">GitHub</span></a></li>
        {% endif %}
      </ul>
      <ul class="copyright">
        <li>&copy; {{ site.author }}</li>
        <li>{{ site.tagline }}</li>
        <li><a href="{{ '/impressum/' | relative_url }}">Legal Notice</a></li>
        <li><a href="{{ '/datenschutz/' | relative_url }}">Privacy Notice</a></li>
      </ul>
    </div>
  </footer>
</div>
